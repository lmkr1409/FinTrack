name: fintrack
description: "FinTrack - Personal Finance Tracker for Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # State management
  flutter_riverpod: ^2.6.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1

  # Statement Upload
  file_picker: ^8.0.0
  csv: ^6.0.0
  excel: ^4.0.0
  fl_chart: ^1.2.0
  share_plus: ^12.0.1

  # SMS & Notifications
  telephony: ^0.2.0
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.0+2
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/database/ddl.sql
    - assets/database/dml.sql

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21
